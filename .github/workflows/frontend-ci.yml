name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'package.json'
  pull_request:
    branches: [ main ]

jobs:
  # (Testing in GitHub's Cloud)
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://xviperx-ubuntu.taildc4417.ts.net:10000
        run: npm run build

  # (Deploying to your Ubuntu Server)
  deploy:
    needs: build 
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Pull and Rebuild Frontend on Server
        run: |
          # 1. Go into the frontend folder to pull the new code
          cd ~/loyfinance-staging/frontend
          git pull origin main
          
          # 2. Go back to the master blueprint folder to rebuild just the frontend
          cd ~/loyfinance-staging
          docker compose up -d --build frontend
